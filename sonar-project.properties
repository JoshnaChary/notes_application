sonar.projectKey=JoshnaChary_notes_application
sonar.organization=joshnachary
sonar.projectName=notes_application

# Source and test directories
sonar.sources=lib
sonar.tests=test

# Coverage report path
sonar.dart.lcov.reportPaths=coverage/lcov.info

# Use CLI-based analyzer instead of Windows executable
sonar.dart.analyzer.cli=true

# Dart analyzer exclusion patterns
sonar.dart.exclude.patterns=**/generated/**,**/*.g.dart,**/*.freezed.dart,**/build/**
sonar.exclusions=**/generated/**,\
                 **/*.g.dart,\
                 **/*.freezed.dart,\
                 **/build/**,\
                 windows/runner/**,\
                 linux/runner/**,\
                 macos/Runner/**,\
                 ios/Runner/**,\
                 android/app/src/main/res/**

# Exclude test files from coverage
sonar.coverage.exclusions=**/*_test.dart,\
                           **/generated/**,\
                           **/*.g.dart,\
                           windows/runner/**,\
                           linux/runner/**

sonar.sourceEncoding=UTF-8

