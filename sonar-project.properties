sonar.projectKey=JoshnaChary_notes_application
sonar.organization=joshnachary
sonar.projectName=notes_application

# Source and test directories
sonar.sources=lib
sonar.tests=test

# Coverage report path (use coverage data instead of Dart analyzer)
sonar.dart.coverage.reportPath=./coverage/lcov.info

# Exclude generated and platform-specific files
sonar.exclusions=**/generated/**,\
                 **/*.g.dart,\
                 **/*.freezed.dart,\
                 **/build/**,\
                 windows/**,\
                 linux/**,\
                 macos/**,\
                 ios/**,\
                 android/**

# Exclude test files from coverage
sonar.coverage.exclusions=**/*_test.dart,\
                           **/generated/**,\
                           **/*.g.dart

sonar.sourceEncoding=UTF-8

