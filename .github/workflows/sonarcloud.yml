name: SonarCloud Analysis

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  sonarcloud:
    name: SonarCloud Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          fetch-depth: 0

      - name: Setup Flutter
        uses: subosito/flutter-action@e938fdf56512cc96ef2f93e8a9c2bd6ec8a5d44a
        with:
          flutter-version: '3.x'
          channel: 'stable'

      - name: Install Flutter dependencies
        run: flutter pub get

      - name: Run Flutter tests with coverage
        run: flutter test --coverage

      - name: Check coverage file exists
        run: |
          echo "=== Coverage folder contents ==="
          ls -la coverage/
          echo "=== lcov.info line count ==="
          wc -l coverage/lcov.info
          echo "=== lcov.info preview ==="
          head -30 coverage/lcov.info

      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@e44e1f68c7e374e39e09e37b5e5b66d6a5fb73a9
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

