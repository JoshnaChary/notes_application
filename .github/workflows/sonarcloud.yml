name: SonarCloud Analysis

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  sonarcloud:
    name: SonarCloud Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          fetch-depth: 0

      - name: Setup Flutter
        uses: subosito/flutter-action@e938fdf56512cc96ef2f93e8a9c2bd6ec8a5d44a
        with:
          flutter-version: '3.x'
          channel: 'stable'

      - name: Install dependencies
        run: flutter pub get

      - name: Build Flutter project
        run: flutter build apk --debug
        continue-on-error: true

      - name: Run Flutter tests with coverage
        run: flutter test --coverage

      - name: Verify coverage file
        run: |
          echo "=== Coverage folder ==="
          ls -la coverage/
          echo "=== lcov.info lines ==="
          wc -l coverage/lcov.info
          echo "=== lcov.info preview ==="
          head -30 coverage/lcov.info

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: https://sonarcloud.io

