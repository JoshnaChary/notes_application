name: SonarCloud Analysis

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  sonarcloud:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Flutter SDK
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.6'
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Run tests with coverage
        run: flutter test --coverage

      - name: Verify coverage file
        run: |
          if [ ! -f coverage/lcov.info ]; then
            echo "Error: coverage/lcov.info was not generated"
            exit 1
          fi
          echo "✓ Coverage file exists"
          ls -lh coverage/lcov.info
          echo "File size: $(wc -l < coverage/lcov.info) lines"
          echo "First 20 lines:"
          head -20 coverage/lcov.info
          echo "Last 5 lines:"
          tail -5 coverage/lcov.info
          echo "✓ Coverage file verified successfully"

      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@v5.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.projectKey=JoshnaChary_notes_application
            -Dsonar.organization=joshnachary
            -Dsonar.language=dart
            -Dsonar.sources=lib/
            -Dsonar.tests=test/
            -Dsonar.coverageReportPaths=coverage/lcov.info
            -Dsonar.coverageReportFormat=lcov
            -Dsonar.exclusions=**/generated/**,**/*.g.dart,**/*.freezed.dart,**/build/**,windows/**,linux/**,macos/**,ios/**,android/**,test/**
            -Dsonar.sourceEncoding=UTF-8
            -Dsonar.projectBaseDir=.

